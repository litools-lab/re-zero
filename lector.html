<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NVMZLD8WBP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NVMZLD8WBP');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lector — Re:Zero ES</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #08080f;
      --bg-card:     #13101f;
      --bg-hover:    #1a1630;
      --bg-bar:      #0c0a17;

      --text:        #e8e4f4;
      --text-soft:   #b0a8cc;
      --text-dim:    #7a7298;
      --text-muted:  #524d6e;

      --violet:      #8b6bbf;
      --violet-l:    #b08de8;
      --violet-ll:   #d4baff;
      --violet-d:    #4a3480;

      --silver:      #a8b0c0;
      --silver-l:    #dce2ee;

      --blood-l:     #c44060;

      --body-font:    'Lora', Georgia, serif;
      --display-font: 'Cinzel', serif;

      --reader-width: 680px;
      --reader-size:  1.1rem;
    }

    /* ── TEMA CLARO ─────────────────────────────────────── */
    [data-theme="light"] {
      --bg:          #f5f3ee;
      --bg-card:     #edeae2;
      --bg-hover:    #e4dfd4;
      --bg-bar:      #ece9e2;

      --text:        #1a1720;
      --text-soft:   #3d3650;
      --text-dim:    #6b6080;
      --text-muted:  #9a90b0;

      --violet:      #6a4daa;
      --violet-l:    #7a5abf;
      --violet-ll:   #5a3d99;
      --violet-d:    #c8b8f0;

      --silver:      #3a3550;
      --silver-l:    #1a1530;

      --blood-l:     #a02040;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body-font);
      font-size: var(--reader-size);
      line-height: 1.95;
      overflow-x: hidden;
    }

    /* ── TOPBAR ───────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-bar);
      border-bottom: 1px solid rgba(139,107,191,0.13);
      display: flex; align-items: center;
      padding: 0 1.4rem; height: 50px;
    }
    .topbar-back {
      font-family: var(--display-font);
      font-size: 0.58rem; letter-spacing: 0.24em;
      color: var(--text-dim); text-decoration: none;
      text-transform: uppercase; white-space: nowrap;
      display: flex; align-items: center; gap: 0.5rem;
      padding-right: 0.8rem; transition: color 0.2s;
    }
    .topbar-back::before { content: '←'; font-size: 0.8rem; }
    .topbar-back:hover { color: var(--violet-l); }
    .topbar-sep {
      width: 1px; height: 20px;
      background: rgba(139,107,191,0.18);
      margin: 0 1rem; flex-shrink: 0;
    }
    .topbar-title {
      font-family: var(--body-font); font-style: italic;
      font-size: 0.88rem; color: var(--text-dim);
      flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .font-controls {
      display: flex; align-items: center; gap: 0.25rem;
      margin-left: 1rem; flex-shrink: 0;
    }
    .font-btn {
      background: none;
      border: 1px solid rgba(139,107,191,0.2);
      color: var(--text-dim);
      font-family: var(--display-font); font-size: 0.65rem;
      padding: 0.22rem 0.5rem; cursor: pointer;
      transition: all 0.18s; line-height: 1;
    }
    .font-btn:hover { border-color: var(--violet); color: var(--violet-l); background: rgba(139,107,191,0.08); }
    .font-label {
      font-family: var(--display-font); font-size: 0.55rem;
      letter-spacing: 0.1em; color: var(--text-muted);
      min-width: 2.4rem; text-align: center;
    }
    .theme-btn {
      background: none;
      border: 1px solid rgba(139,107,191,0.2);
      color: var(--text-dim);
      font-size: 0.78rem;
      width: 1.7rem; height: 1.7rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-left: 0.5rem;
      transition: all 0.18s; line-height: 1; flex-shrink: 0;
    }
    .theme-btn:hover { border-color: var(--violet); color: var(--violet-l); background: rgba(139,107,191,0.08); }

    .progress {
      position: fixed; top: 50px; left: 0; width: 0%; height: 2px;
      background: linear-gradient(90deg, var(--violet-d), var(--blood-l));
      z-index: 99; transition: width 0.08s linear;
    }

    /* ── CABECERA CAPÍTULO ────────────────────────────── */
    .ch-header {
      max-width: var(--reader-width);
      margin: 0 auto; padding: 4.5rem 1.5rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid rgba(139,107,191,0.1);
    }
    .ch-arc {
      font-family: var(--display-font);
      font-size: 0.57rem; letter-spacing: 0.3em;
      color: var(--blood-l); text-transform: uppercase; margin-bottom: 0.7rem;
    }
    .ch-num {
      font-family: var(--display-font);
      font-size: 0.6rem; letter-spacing: 0.26em;
      color: var(--violet); text-transform: uppercase; margin-bottom: 1.2rem;
    }
    .ch-title {
      font-family: var(--body-font); font-style: italic;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: var(--silver-l); line-height: 1.25; margin-bottom: 1.4rem;
    }
    .ch-date {
      font-family: var(--display-font);
      font-size: 0.55rem; letter-spacing: 0.16em;
      color: var(--text-muted); text-transform: uppercase;
    }

    /* ── CUERPO DE LECTURA ────────────────────────────── */
    .reader-body {
      max-width: var(--reader-width);
      margin: 0 auto; padding: 3rem 1.5rem 5rem;
    }
    .reader-body p {
      margin-bottom: 1.35em;
      text-align: justify; hyphens: auto; -webkit-hyphens: auto;
    }
    .reader-body p.sep {
      text-align: center; color: var(--text-muted);
      letter-spacing: 0.4em; font-size: 0.85em;
      margin: 2.5em 0; user-select: none;
    }
    .reader-body h1 {
      font-family: var(--display-font); font-size: 0.92em; font-weight: 500;
      letter-spacing: 0.1em; color: var(--silver-l);
      text-align: center; margin: 3rem 0 0.5rem;
    }
    .reader-body h2 {
      font-family: var(--display-font); font-size: 0.74em; font-weight: 400;
      letter-spacing: 0.14em; color: var(--violet-l);
      text-align: center; margin: 0.4rem 0 0.3rem;
    }
    .reader-body h3 {
      font-family: var(--body-font); font-style: italic;
      font-size: 0.95em; color: var(--text-soft);
      text-align: center; font-weight: 400; margin: 0.3rem 0 2.5rem;
    }
    .reader-body hr {
      border: none; margin: 2.8rem 0;
      display: flex; align-items: center; justify-content: center;
    }
    .reader-body hr::after {
      content: '※ ※ ※ ※ ※ ※ ※ ※ ※ ※ ※';
      color: var(--text-muted); letter-spacing: 0.3em; font-size: 0.75em;
    }
    .reader-body em     { font-style: italic; }
    .reader-body strong { font-weight: 600; color: var(--silver-l); }
    .reader-body p.dropcap::first-letter {
      float: left; font-family: var(--display-font);
      font-size: 3.4em; line-height: 0.78;
      padding-right: 0.08em; padding-top: 0.06em;
      color: var(--violet-ll);
    }

    /* ── NAVEGACIÓN ───────────────────────────────────── */
    .ch-nav {
      max-width: var(--reader-width);
      margin: 0 auto; padding: 0 1.5rem 6rem;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 1rem;
    }
    .nav-btn {
      font-family: var(--display-font);
      font-size: 0.57rem; letter-spacing: 0.2em; text-transform: uppercase;
      text-decoration: none; color: var(--text-dim);
      padding: 0.85rem 1rem;
      border: 1px solid rgba(139,107,191,0.12);
      background: var(--bg-card);
      display: flex; flex-direction: column; gap: 0.3rem;
      transition: all 0.2s;
    }
    .nav-btn:hover { border-color: var(--violet); background: var(--bg-hover); color: var(--violet-l); }
    .nav-btn.prev { text-align: left; }
    .nav-btn.next { text-align: right; }
    .nav-dir   { font-size: 0.52rem; letter-spacing: 0.3em; color: var(--text-muted); }
    .nav-title { font-family: var(--body-font); font-style: italic; font-size: 1.2em; color: var(--silver); }
    .nav-center {
      text-align: center; font-family: var(--display-font);
      font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
      text-decoration: none; color: var(--text-muted); transition: color 0.2s;
    }
    .nav-center:hover { color: var(--violet-l); }

    /* ── ESTADOS ──────────────────────────────────────── */
    .state {
      min-height: 65vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.4rem; padding: 4rem 2rem; text-align: center;
    }
    .state-icon { font-size: 1.8rem; opacity: 0.2; }
    .state-msg  {
      font-family: var(--body-font); font-style: italic;
      font-size: 1.05rem; color: var(--text-soft);
      max-width: 480px; line-height: 1.7;
    }
    .state-msg code {
      font-family: monospace; font-style: normal;
      background: rgba(139,107,191,0.12); padding: 0.1em 0.4em;
      border-radius: 3px; color: var(--violet-l); font-size: 0.88em;
    }
    .state-detail {
      font-family: var(--display-font); font-size: 0.56rem;
      letter-spacing: 0.14em; color: var(--text-muted);
      max-width: 440px;
    }
    .state-link {
      font-family: var(--display-font); font-size: 0.58rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--violet-l); text-decoration: none;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid rgba(139,107,191,0.15);
      border-top-color: var(--violet-l);
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--violet-d); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--violet); }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="topbar-back" href="index.html">Índice</a>
  <div class="topbar-sep"></div>
  <span class="topbar-title" id="topbar-title">Cargando…</span>
  <div class="font-controls">
    <button class="font-btn" id="font-down">A−</button>
    <span  class="font-label" id="font-label">100%</span>
    <button class="font-btn" id="font-up">A+</button>
  </div>
  <button class="theme-btn" id="theme-toggle" title="Cambiar tema claro/oscuro">☀</button>
</nav>
<div class="progress" id="progress"></div>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
(function () {

  /* ── Tema oscuro / claro ── */
  (function () {
    const btn = document.getElementById('theme-toggle');
    let theme = 'dark';
    try { theme = localStorage.getItem('rz-theme') || 'dark'; } catch(e) {}
    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
      btn.textContent = t === 'light' ? '🌙' : '☀';
      btn.title = t === 'light' ? 'Cambiar a tema oscuro' : 'Cambiar a tema claro';
      try { localStorage.setItem('rz-theme', t); } catch(e) {}
    }
    applyTheme(theme);
    btn.addEventListener('click', () => applyTheme(theme === 'light' ? 'dark' : 'light'));
  })();

  /* ── Tamaño de fuente ── */
  const SIZES = [85, 92, 100, 108, 118, 130, 144];
  const BASE  = 1.1;
  let sizeIdx = 2;
  function applySize() {
    document.documentElement.style.setProperty('--reader-size', (BASE * SIZES[sizeIdx] / 100) + 'rem');
    document.getElementById('font-label').textContent = SIZES[sizeIdx] + '%';
    try { localStorage.setItem('rz-sz', sizeIdx); } catch(e) {}
  }
  try { const s = parseInt(localStorage.getItem('rz-sz')); if (!isNaN(s) && s >= 0 && s < SIZES.length) sizeIdx = s; } catch(e) {}
  applySize();
  document.getElementById('font-up').addEventListener('click',   () => { if (sizeIdx < SIZES.length-1) { sizeIdx++; applySize(); } });
  document.getElementById('font-down').addEventListener('click', () => { if (sizeIdx > 0)               { sizeIdx--; applySize(); } });

  /* ── Progreso ── */
  window.addEventListener('scroll', () => {
    const t = document.documentElement.scrollHeight - window.innerHeight;
    document.getElementById('progress').style.width = (t > 0 ? window.scrollY / t * 100 : 0) + '%';
  }, { passive: true });

  /* ── Parámetro ── */
  const params  = new URLSearchParams(location.search);
  const capFile = params.get('cap'); // ej: "contenido/arc01_cap00_prologo.md"
  const app     = document.getElementById('app');

  function showLoading() {
    app.innerHTML = `<div class="state"><div class="spinner"></div><p class="state-msg">Cargando capítulo…</p></div>`;
  }
  function showError(title, detail) {
    app.innerHTML = `<div class="state">
      <div class="state-icon">✦</div>
      <p class="state-msg">${title}</p>
      ${detail ? `<p class="state-detail">${detail}</p>` : ''}
      <a class="state-link" href="index.html">← Volver al índice</a>
    </div>`;
  }

  if (!capFile) {
    showError('No se especificó ningún capítulo.');
    document.getElementById('topbar-title').textContent = 'Error';
    return;
  }

  showLoading();

  /* ── Fetch robusto ──────────────────────────────────────────────────────
     GitHub Pages sirve los archivos .md si existe el fichero .nojekyll
     en la raíz del repo (incluido en este zip).
     La URL relativa funciona porque lector.html está en la raíz y los MD
     están en contenido/, así que fetch('contenido/archivo.md') es correcto.
     ────────────────────────────────────────────────────────────────────── */
  async function safeFetch(url) {
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
    return r;
  }

  Promise.all([
    safeFetch('chapters.json').then(r => r.json()),
    safeFetch(capFile).then(r => r.text())
  ])
  .then(([chapters, mdRaw]) => render(chapters, mdRaw))
  .catch(err => {
    console.error('[Re:Zero lector]', err);
    const isLocal = location.protocol === 'file:';
    if (isLocal) {
      showError(
        'El lector necesita un servidor HTTP para funcionar en local.',
        'Ejecuta <code>npx serve .</code> en la carpeta del proyecto y abre <code>http://localhost:3000</code>'
      );
    } else {
      showError(
        `No se pudo cargar: <code>${capFile}</code>`,
        `Error: ${err.message}. Comprueba que el archivo existe en el repositorio y que hay un fichero <code>.nojekyll</code> en la raíz.`
      );
    }
    document.getElementById('topbar-title').textContent = 'Error al cargar';
  });

  /* ── Render ── */
  function render(chapters, mdRaw) {
    /* Localizar en manifiesto — comparación normalizada */
    const norm = s => decodeURIComponent(s).replace(/\\/g, '/').replace(/^\.\//, '');
    const idx  = chapters.findIndex(c => norm(c.archivo) === norm(capFile));
    const ch   = idx >= 0 ? chapters[idx]     : null;
    const prev = idx >  0 ? chapters[idx - 1] : null;
    const next = idx >= 0 && idx < chapters.length - 1 ? chapters[idx + 1] : null;

    /* Topbar */
    const shortTitle = ch
      ? (ch.tipo === 'prologo' ? 'Prólogo' : ch.tipo === 'epilogo' ? 'Epílogo' : `Cap. ${ch.capitulo}`) + ' — ' + ch.titulo
      : capFile.split('/').pop().replace('.md', '');
    document.getElementById('topbar-title').textContent = shortTitle;
    document.title = shortTitle + ' · Re:Zero ES';

    /* Limpiar encabezados MD si el manifiesto los tiene */
    let md = mdRaw;
    if (ch) {
      // Eliminar bloques iniciales de # ## ### y líneas ---
      md = md.replace(/^(#{1,3}[^\n]*\n|\s*---\s*\n)+/m, '').trimStart();
    }

    /* Parsear */
    /* Fix: Marked interpreta líneas que empiezan con —/― como <hr>.
       Escapamos el primer carácter con una entidad HTML para evitarlo. */
    const mdFixed = md.replace(/^(—|―)/gm, '&#x2015;');
    const html = marked.parse(mdFixed, { gfm: true, breaks: false });

    /* Cabecera */
    let headerHTML = '';
    if (ch) {
      const label = ch.tipo === 'prologo' ? 'Prólogo'
                  : ch.tipo === 'epilogo' ? 'Epílogo'
                  : `Capítulo ${ch.capitulo}`;
      const fecha = ch.fecha
        ? new Date(ch.fecha + 'T12:00:00').toLocaleDateString('es-ES',
            { day: '2-digit', month: 'long', year: 'numeric' })
        : '';
      headerHTML = `
        <header class="ch-header">
          <p class="ch-arc">Arco ${ch.arco} &nbsp;·&nbsp; ${ch.arcoTitulo}</p>
          <p class="ch-num">${label}</p>
          <h1 class="ch-title">«${ch.titulo}»</h1>
          ${fecha ? `<p class="ch-date">${fecha}</p>` : ''}
        </header>`;
    }

    /* Botones nav */
    function navBtn(c, dir) {
      if (!c) return '<span></span>';
      const label    = c.tipo === 'prologo' ? 'Prólogo' : c.tipo === 'epilogo' ? 'Epílogo' : `Cap. ${c.capitulo}`;
      const dirLabel = dir === 'prev' ? '← Anterior' : 'Siguiente →';
      return `<a class="nav-btn ${dir}" href="lector.html?cap=${encodeURIComponent(c.archivo)}">
        <span class="nav-dir">${dirLabel}</span>
        <span class="nav-title">${label}: ${c.titulo}</span>
      </a>`;
    }

    app.innerHTML = `
      ${headerHTML}
      <article class="reader-body" id="reader-body">${html}</article>
      <nav class="ch-nav">
        ${navBtn(prev, 'prev')}
        <a class="nav-center" href="index.html">↑ Índice</a>
        ${navBtn(next, 'next')}
      </nav>`;

    /* Detectar párrafos ※ */
    document.querySelectorAll('#reader-body p').forEach(p => {
      if (/^[※\s✦·\-—]+$/.test(p.textContent.trim())) p.classList.add('sep');
    });

    /* Drop cap — omitir párrafos que abran con guión largo de diálogo */
    const EM_DASH = /^[―—\u2015\u2014]/;
    const paras = [...document.querySelectorAll('#reader-body p:not(.sep)')];
    const dropTarget = paras.find(p => !EM_DASH.test(p.textContent.trim()));
    if (dropTarget) dropTarget.classList.add('dropcap');

    /* Teclado */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' && next) location.href = `lector.html?cap=${encodeURIComponent(next.archivo)}`;
      if (e.key === 'ArrowLeft'  && prev) location.href = `lector.html?cap=${encodeURIComponent(prev.archivo)}`;
    });
  }

})();
</script>
</body>
</html>
