<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re:Zero — Traducción al Español</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080810;
      --bg-mid:     #0e0d18;
      --bg-card:    #100f1c;
      --bg-hover:   #17152b;
      --text:       #cdc8e2;
      --text-dim:   #7870a0;
      --text-muted: #3d3858;
      --violet:     #7b5ea7;
      --violet-l:   #a07fd4;
      --violet-ll:  #c4a8f0;
      --violet-d:   #3d2d6b;
      --violet-glow: rgba(123,94,167,0.22);
      --silver:     #9ba3af;
      --silver-l:   #d0d5db;
      --blood:      #8b1a2a;
      --blood-l:    #c0394d;
      --blood-glow: rgba(139,26,42,0.28);
      --serif:      'Cormorant Garamond', Georgia, serif;
      --display:    'Cinzel', serif;
      --fell:       'IM Fell English', serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 25%, rgba(61,45,107,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 45% 45% at 75% 80%, rgba(80,20,35,0.2) 0%, transparent 55%);
      z-index: 0;
    }
    .particles { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .mote {
      position:absolute; border-radius:50%;
      background:var(--violet); opacity:0;
      animation:float linear infinite;
    }
    @keyframes float {
      0%  {opacity:0; transform:translateY(100%) scale(0.5);}
      15% {opacity:0.16;}
      85% {opacity:0.07;}
      100%{opacity:0; transform:translateY(-20%) scale(1.2);}
    }
    .drop {
      position:absolute;
      border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
      background:var(--blood-l); opacity:0;
      animation:fall linear infinite;
    }
    @keyframes fall {
      0%  {opacity:0; transform:translateY(-10px) scaleY(1);}
      8%  {opacity:0.35;}
      80% {opacity:0.12;}
      100%{opacity:0; transform:translateY(100vh) scaleY(2);}
    }
    .hero-content { position:relative; z-index:1; max-width:700px; }

    .hero-tag {
      font-family:var(--display); font-size:0.63rem; letter-spacing:.38em;
      color:var(--violet-l); text-transform:uppercase; margin-bottom:2rem;
      opacity:0; animation:fadeUp 1s ease .3s forwards;
    }
    .hero-logo {
      margin-bottom:1.8rem;
      opacity:0; animation:fadeUp 1.1s ease .5s forwards;
    }
    .hero-logo img {
      width:clamp(130px,20vw,200px); height:auto;
      filter:drop-shadow(0 0 30px var(--violet-glow)) drop-shadow(0 0 8px rgba(160,127,212,.18));
    }
    .hero-title {
      font-family:var(--display); font-size:clamp(2.6rem,7vw,5.6rem);
      font-weight:600; line-height:1; letter-spacing:.06em; margin-bottom:.25em;
      opacity:0; animation:fadeUp 1s ease .7s forwards;
    }
    .hero-title .re   { color:var(--silver-l); }
    .hero-title .zero { color:var(--violet-ll); text-shadow:0 0 38px rgba(196,168,240,.4); }
    .hero-subtitle {
      font-family:var(--fell); font-style:italic;
      font-size:clamp(.95rem,2.5vw,1.3rem); color:var(--text-dim); margin-bottom:.5rem;
      opacity:0; animation:fadeUp 1s ease .9s forwards;
    }
    .hero-author {
      font-family:var(--display); font-size:.65rem; letter-spacing:.22em;
      color:var(--violet); text-transform:uppercase; margin-bottom:3.5rem;
      opacity:0; animation:fadeUp 1s ease 1.05s forwards;
    }
    .hero-divider {
      width:90px; height:1px;
      background:linear-gradient(90deg,transparent,var(--violet),transparent);
      margin:0 auto 3.5rem;
      opacity:0; animation:fadeIn 1.2s ease 1.2s forwards;
    }
    .scroll-hint {
      font-family:var(--display); font-size:.6rem; letter-spacing:.3em;
      color:var(--text-muted); text-transform:uppercase;
      opacity:0; animation:fadeIn 1s ease 1.7s forwards, bob 2.6s ease 2.8s infinite;
    }
    @keyframes bob    {0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)}}
    @keyframes fadeUp {from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn {from{opacity:0} to{opacity:1}}

    /* CONTENT */
    .content { max-width:860px; margin:0 auto; padding:5rem 2rem 9rem; }

    .section-label {
      font-family:var(--display); font-size:.64rem; letter-spacing:.35em;
      color:var(--violet-l); text-transform:uppercase;
      margin-bottom:3rem;
      display:flex; align-items:center; gap:1.4rem;
    }
    .section-label::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(90deg,var(--violet-d),transparent);
    }

    .arc-block { margin-bottom:4rem; }
    .arc-header {
      display:flex; align-items:baseline; gap:1.2rem;
      margin-bottom:1.2rem; padding-bottom:.75rem;
      border-bottom:1px solid rgba(123,94,167,.12);
    }
    .arc-number {
      font-family:var(--display); font-size:.6rem; letter-spacing:.25em;
      color:var(--blood-l); text-transform:uppercase;
    }
    .arc-title {
      font-family:var(--fell); font-style:italic;
      font-size:1.08rem; color:var(--silver);
    }

    .chapter-list { display:flex; flex-direction:column; gap:2px; }
    .chapter-card {
      display:grid; grid-template-columns:5.5rem 1fr auto;
      align-items:center; gap:1rem;
      padding:.85rem 1.1rem;
      background:var(--bg-card);
      border:1px solid rgba(123,94,167,.07);
      border-left:2px solid transparent;
      text-decoration:none; color:inherit;
      transition:all .22s ease;
    }
    .chapter-card:hover {
      border-left-color:var(--blood-l);
      background:var(--bg-hover);
      transform:translateX(5px);
    }
    .chapter-card:hover .cap-titulo { color:var(--violet-ll); }
    .chapter-card:hover .cap-num    { color:var(--blood-l); }

    .cap-num {
      font-family:var(--display); font-size:.58rem; letter-spacing:.16em;
      color:var(--text-muted); text-align:right;
      transition:color .22s;
    }
    .cap-tipo-prologo .cap-num,
    .cap-tipo-epilogo .cap-num { color:var(--violet); }
    .cap-titulo {
      font-family:var(--fell); font-size:1.05rem;
      color:var(--text); transition:color .22s;
    }
    .cap-tipo-prologo .cap-titulo,
    .cap-tipo-epilogo .cap-titulo { font-style:italic; }
    .cap-fecha {
      font-family:var(--display); font-size:.56rem; letter-spacing:.12em;
      color:var(--text-muted); white-space:nowrap;
    }
    .empty-cap {
      padding:1rem 1.1rem; color:var(--text-muted);
      font-style:italic; font-size:.95rem;
    }

    footer {
      text-align:center; padding:3rem 2rem;
      border-top:1px solid rgba(123,94,167,.1);
      font-family:var(--display); font-size:.58rem;
      letter-spacing:.18em; color:var(--text-muted); text-transform:uppercase;
    }
    footer a { color:var(--text-dim); text-decoration:none; }
    footer a:hover { color:var(--violet-l); }
  </style>
</head>
<body>

<header class="hero">
  <div class="particles" id="particles"></div>
  <div class="hero-content">
    <p class="hero-tag">Novela Web &nbsp;·&nbsp; Traducción no oficial al español</p>
    <div class="hero-logo"><img src="favicon.png" alt="Re:Zero" /></div>
    <h1 class="hero-title"><span class="re">Re:</span><span class="zero">Zero</span></h1>
    <p class="hero-subtitle">Kara Hajimeru Isekai Seikatsu</p>
    <p class="hero-author">Tappei Nagatsuki</p>
    <div class="hero-divider"></div>
    <p class="scroll-hint">↓ &nbsp; Leer</p>
  </div>
</header>

<main class="content">
  <p class="section-label">Índice de capítulos</p>
  <div id="arc-container">
    <p style="color:var(--text-muted);font-style:italic;">Cargando capítulos…</p>
  </div>
</main>

<footer>
  <p>Traducción no oficial al español &nbsp;·&nbsp; Obra original © Tappei Nagatsuki</p>
  <p style="margin-top:.6rem"><a href="https://syosetu.com/" target="_blank" rel="noopener">Fuente original en Syosetu</a></p>
</footer>

<script>
  const pc = document.getElementById('particles');
  for (let i=0;i<18;i++){
    const m=document.createElement('div'); m.className='mote';
    const s=Math.random()*4+2;
    m.style.cssText=`left:${Math.random()*100}%;bottom:-5%;width:${s}px;height:${s}px;animation-duration:${Math.random()*12+10}s;animation-delay:${Math.random()*14}s;`;
    pc.appendChild(m);
  }
  for (let i=0;i<6;i++){
    const d=document.createElement('div'); d.className='drop';
    const s=Math.random()*2+1.2;
    d.style.cssText=`left:${Math.random()*100}%;top:-5%;width:${s}px;height:${s*3}px;animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*15}s;`;
    pc.appendChild(d);
  }

  async function loadChapters(){
    let chapters;
    try{ const r=await fetch('chapters.json'); chapters=await r.json(); }
    catch(e){ document.getElementById('arc-container').innerHTML='<p style="color:var(--text-muted);font-style:italic;">No se pudo cargar el índice.</p>'; return; }
    const arcs={};
    for(const ch of chapters){
      if(!arcs[ch.arco]) arcs[ch.arco]={titulo:ch.arcoTitulo,caps:[]};
      arcs[ch.arco].caps.push(ch);
    }
    const wrap=document.getElementById('arc-container'); wrap.innerHTML='';
    for(const [n,arc] of Object.entries(arcs)){
      const block=document.createElement('div'); block.className='arc-block';
      block.innerHTML=`<div class="arc-header"><span class="arc-number">Arco ${n}</span><span class="arc-title">${arc.titulo}</span></div><div class="chapter-list" id="arc-${n}-list"></div>`;
      wrap.appendChild(block);
      const list=block.querySelector(`#arc-${n}-list`);
      if(!arc.caps.length){ list.innerHTML='<p class="empty-cap">Próximamente…</p>'; continue; }
      for(const ch of arc.caps){
        const label=ch.tipo==='prologo'?'Prólogo':ch.tipo==='epilogo'?'Epílogo':`Cap. ${ch.capitulo}`;
        const fecha=ch.fecha?new Date(ch.fecha).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'';
        const card=document.createElement('a');
        card.className=`chapter-card cap-tipo-${ch.tipo||'normal'}`;
        card.href=`lector.html?cap=${encodeURIComponent(ch.archivo)}`;
        card.title=ch.resumen||'';
        card.innerHTML=`<span class="cap-num">${label}</span><span class="cap-titulo">${ch.titulo}</span><span class="cap-fecha">${fecha}</span>`;
        list.appendChild(card);
      }
    }
  }
  loadChapters();
</script>
</body>
</html>
